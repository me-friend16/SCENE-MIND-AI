version: '3.9'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: scenemind-ai-frontend
    ports:
      - '3000:3000'
    depends_on:
      - backend
      - ai
    environment:
      NEXT_PUBLIC_API_URL: http://backend:8000
      NEXT_PUBLIC_AI_URL: http://ai:8001

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: scenemind-ai-backend
    ports:
      - '8000:8000'
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_DATABASE: scenemind
      DB_USERNAME: postgres
      DB_PASSWORD: postgres
      REDIS_HOST: redis
      APP_ENV: production
      APP_KEY: base64:CHANGE_ME
      SANCTUM_STATEFUL_DOMAINS: localhost
      SESSION_DRIVER: redis
      CACHE_DRIVER: redis

  ai:
    build:
      context: ./ai
      dockerfile: Dockerfile
    image: scenemind-ai-ai
    ports:
      - '8001:8001'
    environment:
      AI_MODEL: gpt-4o
      VECTOR_STORE_PATH: /data/vectors

  postgres:
    image: postgres:15
    restart: unless-stopped
    environment:
      POSTGRES_DB: scenemind
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    restart: unless-stopped
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
